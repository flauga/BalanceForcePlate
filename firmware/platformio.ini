; PlatformIO configuration for ESP32 Force Plate (Phase 1)
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; Ensure dual-core mode — adcTask pins to Core 1, udpTask to Core 0.
    -DCONFIG_FREERTOS_UNICORE=0

; All required libraries are bundled with the espressif32 Arduino core:
;   - WiFi, WiFiUdp  (AP mode + UDP socket)
;   - esp_wifi.h     (esp_wifi_set_ps — power-save disable)
;   - freertos/ringbuf.h  (xRingbufferCreate / xRingbufferSend)
;   - hw_timer (timerBegin / timerAlarmWrite)
; No extra lib_deps required.

; HX711 pin mapping (bit-banged — not hardware SPI):
;   SCK  = GPIO 18  (shared clock to all four HX711s)
;   DOUT TL = GPIO 19
;   DOUT TR = GPIO 21
;   DOUT BL = GPIO 22
;   DOUT BR = GPIO 23
