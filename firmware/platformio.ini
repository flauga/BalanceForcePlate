; PlatformIO configuration for IMU Balance Board
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 460800
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1

; WiFi + mDNS are built into the ESP32 Arduino core — no extra lib_deps needed.

; SPI pins (VSPI defaults)
; SCK  = GPIO 18
; MOSI = GPIO 23
; MISO = GPIO 19
; CS   = GPIO 5
