[build]
  command   = "pnpm --filter web build"
  publish   = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all routes to Next.js (handled by the plugin, but explicit for clarity)
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200
