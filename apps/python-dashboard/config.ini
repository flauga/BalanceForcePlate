[plate]
; Half-dimensions of the plate from centre to corner (mm).
; Adjust to match your physical plate geometry.
half_width_mm  = 200
half_height_mm = 200

; Subject body weight used to compute the COP guard threshold.
; COP is only calculated when F_total > cop_guard_fraction × body_weight_kg × g.
; Update this before each session via the CLI: python main.py --weight 75.0
body_weight_kg = 70.0

[network]
; UDP socket binding.  Keep 0.0.0.0 to accept on all interfaces.
udp_bind_ip = 0.0.0.0

; Must match UDP_DEST_PORT in firmware config.h (default 12345).
udp_port = 12345

[session]
; Default recording duration in seconds (can be overridden in the UI).
default_duration_s = 30

; COP is only computed when F_total exceeds this fraction of body weight.
; 0.05 = 5 % body weight (~3.4 kg for a 70 kg subject).
cop_guard_fraction = 0.05

[logging]
; Directory where session CSV files are written.
; ~ is expanded to the user home directory.
output_dir = ~/force-plate-sessions
